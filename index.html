
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九方</title>
  <meta name="description" content="九刻舟 剑涤尘 破心方">
  <link rel="icon" href="/image/favicon.jpg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fbfcff;--card:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--accent-blue:#2e6f9e;--accent-gold:#b8860b;--code-bg:#f4f8fb;--code-card:#fbfdff;--code-border:#cfdce8;--code-text:#1a344a;--code-muted:#6f8495;--heart-bg:#fff8ee;--heart-card:#fffdf8;--heart-border:#ead8bd;--heart-text:#473421;--heart-muted:#8b7355}
    body.dark-mode{--bg:#0d1117;--card:#161b22;--text:#c9d1d9;--muted:#8b949e;--border:#30363d;--accent-blue:#7db7dc;--accent-gold:#d4a843;--code-bg:#111820;--code-card:#151f28;--code-border:#2d4456;--code-text:#d7e8f2;--code-muted:#8ba3b2;--heart-bg:#1a1814;--heart-card:#1e1c16;--heart-border:#3a3226;--heart-text:#d4c9b8;--heart-muted:#8b7e6a}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden}

    .dark-toggle{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:.8rem;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;padding:0;line-height:1;vertical-align:middle}
    .dark-toggle:hover{border-color:var(--accent-blue);color:var(--text)}
    .dark-toggle:focus-visible,
    .realm-card:focus-visible,
    .sticky-card:focus-visible{outline:2px solid var(--accent-blue);outline-offset:3px}

    /* Main container */
    .main-container{max-width:1100px;margin:0 auto;padding:18vh 1.5rem 0;min-height:100vh}

    /* Page header */
    .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.8rem}
    .page-title{font-family:"Noto Serif SC","Ma Shan Zheng",serif;font-size:1.6rem;font-weight:700;color:var(--text)}
    .page-sub{font-size:.85rem;color:var(--muted);margin-top:.25rem}
    .github-link{display:inline-flex;align-items:center;gap:.35rem;margin-top:.45rem;font-size:.78rem;color:var(--muted);text-decoration:none;transition:color .15s}
    .github-link:hover{color:var(--accent-blue)}

    /* Sticky */
    .section-wrap{margin-bottom:1.8rem}
    .section-label{font-size:.78rem;color:var(--muted);margin-bottom:.6rem;display:flex;align-items:center;gap:.3rem}
    .sticky-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.6rem}
    .sticky-card{display:flex;gap:.7rem;padding:.75rem;border-radius:8px;background:var(--card);border:1px solid var(--border);text-decoration:none;transition:border-color .15s}
    .sticky-card:hover{border-color:var(--accent-blue)}
    .sticky-cover{width:48px;height:48px;border-radius:5px;background-size:cover;background-position:center;flex-shrink:0;background-color:var(--border)}
    .sticky-info{flex:1;min-width:0}
    .sticky-title{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.15rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sticky-desc{font-size:.78rem;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    /* Dual */
    .custom-dual{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
    .realm{position:relative;overflow:hidden;border-radius:10px;padding:1.2rem;border:1px solid;box-shadow:0 18px 48px rgba(31,41,55,.06);cursor:pointer;transition:transform .25s,box-shadow .25s,border-color .25s}
    .realm:hover{transform:translateY(-4px);box-shadow:0 26px 58px rgba(31,41,55,.12)}
    .realm::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.72}
    .realm::after{position:absolute;right:.9rem;bottom:-.8rem;font-family:"Noto Serif SC","Ma Shan Zheng",serif;font-size:5.6rem;line-height:1;font-weight:700;pointer-events:none;opacity:.055}
    .realm-code{border-color:var(--code-border);background:linear-gradient(135deg,rgba(255,255,255,.9),var(--code-card) 38%,var(--code-bg))}
    .realm-code::before{background:linear-gradient(90deg,rgba(46,111,158,.18) 0 3px,transparent 3px),linear-gradient(180deg,rgba(46,111,158,.065),transparent 46%)}
    .realm-code::after{content:"物";color:var(--accent-blue)}
    .realm-heart{border-color:var(--heart-border);background:linear-gradient(135deg,rgba(255,255,255,.86),var(--heart-card) 38%,var(--heart-bg))}
    .realm-heart::before{background:linear-gradient(90deg,rgba(184,134,11,.16) 0 3px,transparent 3px),linear-gradient(180deg,rgba(184,134,11,.06),transparent 46%)}
    .realm-heart::after{content:"心";color:var(--accent-gold);font-weight:400}
    .realm-header,.realm-posts{position:relative;z-index:1}
    .realm-header{display:flex;align-items:center;gap:.4rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid}
    .realm-code .realm-header{border-bottom-color:var(--code-border)}
    .realm-heart .realm-header{border-bottom-color:var(--heart-border)}
    .realm-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem}
    .realm-code .realm-icon{background:rgba(37,99,235,0.1);color:var(--accent-blue);box-shadow:inset 0 0 0 1px rgba(46,111,158,.12)}
    .realm-heart .realm-icon{background:rgba(184,134,11,0.1);color:var(--accent-gold);box-shadow:inset 0 0 0 1px rgba(184,134,11,.12)}
    .realm-title{font-family:"Noto Serif SC","Ma Shan Zheng",serif;font-size:1.16rem;font-weight:700;color:var(--text)}
    .realm-tagline{font-size:.72rem;margin-left:auto;color:var(--muted);opacity:.78;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42%}
    .realm-posts{display:flex;flex-direction:column;gap:.5rem}
    .realm-card{display:flex;gap:.65rem;padding:.7rem;border-radius:7px;text-decoration:none;transition:all .15s;border:1px solid;background:rgba(255,255,255,.48)}
    .code-card{border-color:var(--code-border)}
    .code-card:hover{border-color:var(--accent-blue);transform:translateY(-1px)}
    .heart-card{border-color:var(--heart-border)}
    .heart-card:hover{border-color:var(--accent-gold);transform:translateY(-1px)}
    .card-cover-img{width:42px;height:42px;border-radius:5px;background-size:cover;background-position:center;flex-shrink:0}
    .card-cover-placeholder{display:flex;align-items:center;justify-content:center;font-size:.9rem}
    .code-card .card-cover-img{background-color:var(--code-border)}
    .heart-card .card-cover-img{background-color:var(--heart-border)}
    .code-card .card-cover-placeholder{color:var(--accent-blue)}
    .heart-card .card-cover-placeholder{color:var(--accent-gold)}
    .card-body{flex:1;min-width:0}
    .card-title{font-size:.9rem;font-weight:600;margin:0 0 .1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
    .code-card .card-title{font-family:"SF Mono","Fira Code","Consolas",monospace}
    .heart-card .card-title{font-family:"Noto Serif SC","Ma Shan Zheng",serif}
    .card-desc{font-size:.75rem;color:var(--muted);margin:0 0 .25rem;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
    .card-meta{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:.2rem;flex-wrap:wrap}
    .card-divider{opacity:.3}
    .meta-cat{opacity:.6}
    .empty-state{font-size:.78rem;color:var(--muted);padding:.7rem;border:1px dashed currentColor;border-radius:7px;opacity:.75}

    /* Footer */
    .site-footer{text-align:center;padding:1.2rem 1.5rem;margin-top:2rem;color:var(--muted);font-size:.75rem;border-top:1px solid var(--border)}

    @media screen and (max-width:768px){
      .custom-dual{grid-template-columns:1fr;gap:.8rem}
      .sticky-cards{grid-template-columns:1fr}
      .main-container{padding:2rem 1rem}
      .page-header{flex-direction:column;gap:.6rem;margin-bottom:1.4rem}
      .page-title{font-size:1.3rem}
    }
    @media screen and (max-width:480px){
      .realm-header{flex-wrap:wrap}
      .realm-tagline{order:3;width:100%;max-width:none;margin-left:0}
      .realm-card{flex-direction:column}
      .card-cover-img{width:100%;height:90px}
    }
  </style>
</head>
<body>
<div class="main-container">

  <header class="page-header">
    <div>
      <h1 class="page-title">九方</h1>
      <p class="page-sub">九刻舟 · 剑涤尘 · 破心方</p>
      <a class="github-link" href="https://github.com/suxilovef" target="_blank" rel="noopener" title="GitHub"><i class="fab fa-github"></i> suxilovef</a>
    </div>
    <button class="dark-toggle" id="darkToggle" title="暗色模式" aria-label="切换暗色模式"><i class="fas fa-moon"></i></button>
  </header>

  <div class="section-wrap" id="stickySection">
    <div class="section-label"><i class="fas fa-thumbtack"></i> <span>置顶</span></div>
    <div class="sticky-cards" id="stickyCards"></div>
  </div>

  <section class="custom-dual">
    <div class="realm realm-code" data-href="/wujing/">
      <div class="realm-header">
        <div class="realm-icon"><i class="fas fa-cube"></i></div>
        <h2 class="realm-title">物境</h2>
        <div class="realm-tagline">格物致知 · 理以载道</div>
      </div>
      <div class="realm-posts" id="wujingPosts"></div>
    </div>
    <div class="realm realm-heart" data-href="/xinjing/">
      <div class="realm-header">
        <div class="realm-icon"><i class="fas fa-feather-alt"></i></div>
        <h2 class="realm-title">心境</h2>
        <div class="realm-tagline">心之所向 · 素履以往</div>
      </div>
      <div class="realm-posts" id="xinjingPosts"></div>
    </div>
  </section>

  <footer class="site-footer">&copy; 2025–2026 九方</footer>

</div>

  <script src="/js/realm-posts.js"></script>
  <script>
  (function(){
    RealmPosts.fetch().then(function(data){
      RealmPosts.renderSticky(data, 'stickyCards', 'stickySection');
      RealmPosts.renderHomeRealm(data, {
        containerId: 'wujingPosts',
        realm: 'wujing',
        fallbackCategory: ['Spring', 'Mybatis'],
        fallbackPath: '/物境/',
        type: 'code'
      });
      RealmPosts.renderHomeRealm(data, {
        containerId: 'xinjingPosts',
        realm: 'xinjing',
        fallbackCategory: '经文',
        fallbackPath: '/心境/',
        type: 'heart'
      });
    }).catch(function(err){ console.error(err); });

    // Realm card click — navigate on blank-space click
    document.querySelectorAll('.realm[data-href]').forEach(function(realm){
      realm.addEventListener('click', function(e){
        if (!e.target.closest('a')) {
          window.location.href = realm.getAttribute('data-href');
        }
      });
    });

    var darkToggle = document.getElementById('darkToggle');
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark-mode');
      darkToggle.innerHTML = '<i class="fas fa-sun"></i>';
    }
    darkToggle.addEventListener('click', function(){
      document.body.classList.toggle('dark-mode');
      var isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('darkMode', isDark);
      darkToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });
  })();
  </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="#ffffff"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Monitor/Dashboard frame -->
    <rect x="300" y="180" width="1000" height="460" rx="16" stroke="#374151" stroke-width="14"/>
    <rect x="330" y="210" width="940" height="400" rx="10" stroke="#E5E7EB" stroke-width="4"/>

    <!-- Dashboard header bar -->
    <rect x="330" y="210" width="940" height="50" rx="8" fill="#F9FAFB" stroke="none"/>
    <rect x="330" y="252" width="940" height="8" rx="0" fill="#F9FAFB" stroke="none"/>

    <!-- Chart 1: Line chart (left) -->
    <rect x="360" y="280" width="420" height="150" rx="8" stroke="#E5E7EB" stroke-width="3"/>
    <path d="M380 400 L460 370 L540 390 L620 340 L700 360 L760 310" stroke="#DC382D" stroke-width="5"/>
    <circle cx="380" cy="400" r="6" fill="#DC382D"/>
    <circle cx="760" cy="310" r="6" fill="#34D399"/>

    <!-- Chart 2: Bar chart (right) -->
    <rect x="820" y="280" width="420" height="150" rx="8" stroke="#E5E7EB" stroke-width="3"/>
    <rect x="850" y="370" width="50" height="50" rx="4" fill="#DC382D" stroke="none" opacity="0.8"/>
    <rect x="920" y="340" width="50" height="80" rx="4" fill="#DC382D" stroke="none" opacity="0.65"/>
    <rect x="990" y="360" width="50" height="60" rx="4" fill="#34D399" stroke="none" opacity="0.7"/>
    <rect x="1060" y="300" width="50" height="120" rx="4" fill="#DC382D" stroke="none" opacity="0.85"/>
    <rect x="1130" y="330" width="50" height="90" rx="4" fill="#F59E0B" stroke="none" opacity="0.6"/>

    <!-- Bottom panels -->
    <rect x="360" y="450" width="420" height="120" rx="8" stroke="#E5E7EB" stroke-width="3"/>
    <text x="570" y="510" text-anchor="middle" font-size="36" font-weight="700" fill="#DC382D" stroke="none">99.97%</text>
    <text x="570" y="545" text-anchor="middle" font-size="16" fill="#6B7280" stroke="none">SLA 达标率 (30d)</text>

    <rect x="820" y="450" width="420" height="120" rx="8" stroke="#E5E7EB" stroke-width="3"/>
    <text x="1030" y="500" text-anchor="middle" font-size="24" font-weight="600" fill="#374151" stroke="none">慢查询 · 内存碎片 · 大Key</text>
    <text x="1030" y="535" text-anchor="middle" font-size="16" fill="#6B7280" stroke="none">TOP 3 排查方向</text>

    <!-- Magnifying glass icon -->
    <g transform="translate(680,160)">
      <circle cx="28" cy="28" r="22" stroke="#DC382D" stroke-width="6"/>
      <line x1="44" y1="44" x2="62" y2="62" stroke="#DC382D" stroke-width="6"/>
    </g>

    <!-- Gear icon -->
    <g transform="translate(860,165)">
      <circle cx="24" cy="24" r="16" stroke="#F59E0B" stroke-width="5"/>
      <circle cx="24" cy="24" r="6" fill="#F59E0B" stroke="none"/>
    </g>
  </g>

  <g font-family="'Segoe UI','Noto Sans','Arial',sans-serif" fill="#111827">
    <text x="800" y="780" font-size="72" text-anchor="middle" font-weight="800">Redis 运维治理</text>
    <text x="800" y="840" font-size="28" text-anchor="middle" font-weight="600" fill="#6B7280">线上问题排查 · 监控告警 · 性能调优</text>
  </g>
</svg>

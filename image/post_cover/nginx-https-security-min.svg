<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="#ffffff"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Large shield shape (center) -->
    <path d="M700 160 L800 120 L900 160 L900 320 Q900 460 800 520 Q700 460 700 320 Z" stroke="#009639" stroke-width="5" fill="#F0FDF4" opacity="0.6"/>

    <!-- Lock icon inside shield -->
    <rect x="765" y="260" width="70" height="55" rx="8" stroke="#009639" stroke-width="4" fill="#009639" opacity="0.15"/>
    <path d="M775 260 L775 240 Q775 220 800 220 Q825 220 825 240 L825 260" stroke="#009639" stroke-width="4" fill="none"/>
    <circle cx="800" cy="292" r="8" fill="#009639"/>

    <!-- Certificate icon -->
    <g transform="translate(760, 350)">
      <rect x="0" y="0" width="80" height="55" rx="6" stroke="#F59E0B" stroke-width="3" fill="#FFFBEB"/>
      <line x1="15" y1="15" x2="65" y2="15" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
      <line x1="15" y1="28" x2="55" y2="28" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
      <line x1="15" y1="41" x2="45" y2="41" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- TLS handshake network lines (left side) -->
    <path d="M100 250 C250 200 350 280 500 220" stroke="#009639" stroke-width="4" opacity="0.25"/>
    <path d="M150 320 C300 380 400 300 540 340" stroke="#34D399" stroke-width="3" opacity="0.2"/>
    <path d="M80 450 C200 500 350 420 500 480" stroke="#009639" stroke-width="4" opacity="0.2"/>

    <!-- HTTPS padlock decoration (left) -->
    <circle cx="160" cy="220" r="25" fill="#009639" opacity="0.1" stroke="#009639" stroke-width="2"/>
    <text x="160" y="226" text-anchor="middle" font-size="22">🔒</text>

    <!-- Access control gates (right side) -->
    <g transform="translate(1050, 180)">
      <!-- Gate 1 -->
      <rect x="0" y="0" width="160" height="50" rx="10" stroke="#009639" stroke-width="3" fill="#F0FDF4"/>
      <text x="80" y="30" text-anchor="middle" font-size="16" fill="#009639" font-weight="600">IP 白名单</text>

      <!-- Gate 2 -->
      <rect x="180" y="80" width="160" height="50" rx="10" stroke="#009639" stroke-width="3" fill="#F0FDF4"/>
      <text x="260" y="110" text-anchor="middle" font-size="16" fill="#009639" font-weight="600">限流限速</text>

      <!-- Gate 3 -->
      <rect x="360" y="160" width="160" height="50" rx="10" stroke="#009639" stroke-width="3" fill="#F0FDF4"/>
      <text x="440" y="190" text-anchor="middle" font-size="16" fill="#009639" font-weight="600">防盗链</text>

      <!-- Arrows between gates -->
      <path d="M160 25 L180 25" stroke="#009639" stroke-width="2" opacity="0.4" marker-end="url(#arrowG)"/>
      <path d="M260 105 L260 130 L260 130" stroke="#009639" stroke-width="2" opacity="0.3"/>
      <path d="M340 105 L360 105" stroke="#009639" stroke-width="2" opacity="0.4" marker-end="url(#arrowG)"/>
    </g>

    <!-- HTTP -> HTTPS redirect arrow (top) -->
    <path d="M600 130 Q700 100 800 130" stroke="#EF4444" stroke-width="3" opacity="0.4" stroke-dasharray="6,3"/>
    <path d="M800 130 Q900 100 1000 130" stroke="#009639" stroke-width="3" opacity="0.6"/>

    <!-- Security header badges -->
    <g transform="translate(980, 450)">
      <rect x="0" y="0" width="130" height="30" rx="6" stroke="#6B7280" stroke-width="2" fill="#F9FAFB"/>
      <text x="65" y="20" text-anchor="middle" font-size="12" fill="#6B7280">HSTS</text>
      <rect x="150" y="0" width="160" height="30" rx="6" stroke="#6B7280" stroke-width="2" fill="#F9FAFB"/>
      <text x="230" y="20" text-anchor="middle" font-size="12" fill="#6B7280">CSP</text>
      <rect x="330" y="0" width="170" height="30" rx="6" stroke="#6B7280" stroke-width="2" fill="#F9FAFB"/>
      <text x="415" y="20" text-anchor="middle" font-size="12" fill="#6B7280">X-Frame-Options</text>
    </g>

    <!-- Decorative roaming arcs -->
    <path d="M120 560 C300 620 500 540 600 600" stroke="#009639" stroke-width="3" opacity="0.15"/>
    <path d="M1000 580 C1200 640 1400 560 1500 620" stroke="#34D399" stroke-width="3" opacity="0.15"/>

    <!-- Decorative dots -->
    <circle cx="450" cy="180" r="4" fill="#009639" opacity="0.2"/>
    <circle cx="550" cy="500" r="3" fill="#009639" opacity="0.15"/>
    <circle cx="1300" cy="160" r="4" fill="#009639" opacity="0.2"/>
  </g>

  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#009639"/>
    </marker>
  </defs>

  <g font-family="'Segoe UI','Noto Sans','Arial',sans-serif" fill="#111827">
    <text x="800" y="790" font-size="60" text-anchor="middle" font-weight="800">HTTPS 安全与访问治理</text>
    <text x="800" y="845" font-size="26" text-anchor="middle" font-weight="600" fill="#6B7280">TLS 证书 · HTTP/2 · 限流 · 防盗链 · 安全 Header</text>
  </g>
</svg>

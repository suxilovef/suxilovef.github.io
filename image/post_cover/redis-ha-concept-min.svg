<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="#ffffff"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Master node -->
    <rect x="380" y="280" width="180" height="180" rx="12" stroke="#DC382D" stroke-width="20"/>
    <text x="470" y="395" text-anchor="middle" font-size="52" font-weight="900" fill="#DC382D" font-family="sans-serif">M</text>

    <!-- Replica node -->
    <rect x="1040" y="280" width="180" height="180" rx="12" stroke="#DC382D" stroke-width="14" opacity="0.55"/>
    <text x="1130" y="395" text-anchor="middle" font-size="52" font-weight="900" fill="#DC382D" font-family="sans-serif" opacity="0.55">R</text>

    <!-- Replication arrows -->
    <path d="M560 340 L1040 340" stroke="#DC382D" stroke-width="6" stroke-dasharray="14 8"/>
    <path d="M560 400 L1040 400" stroke="#34D399" stroke-width="4" stroke-dasharray="8 6" opacity="0.7"/>

    <!-- Arrow heads -->
    <path d="M1010 320 L1040 340 L1010 360" stroke="#DC382D" stroke-width="5" fill="none"/>
    <path d="M1010 380 L1040 400 L1010 420" stroke="#34D399" stroke-width="4" fill="none" opacity="0.7"/>

    <!-- Sentinel stars -->
    <g transform="translate(750,180)">
      <path d="M25 0 L32 18 L50 22 L36 36 L40 55 L25 45 L10 55 L14 36 L0 22 L18 18 Z" stroke="#F59E0B" stroke-width="4" fill="none"/>
    </g>
    <g transform="translate(820,520)">
      <path d="M25 0 L32 18 L50 22 L36 36 L40 55 L25 45 L10 55 L14 36 L0 22 L18 18 Z" stroke="#F59E0B" stroke-width="4" fill="none"/>
    </g>

    <!-- Decorative arcs -->
    <path d="M380 500 Q800 700 1220 500" stroke="#F59E0B" stroke-width="5" opacity="0.35"/>
    <path d="M420 260 Q800 100 1180 260" stroke="#34D399" stroke-width="4" opacity="0.25"/>
  </g>

  <!-- Sentinel labels -->
  <text x="775" y="185" text-anchor="middle" font-size="22" fill="#F59E0B" font-weight="600" stroke="none">Sentinel</text>
  <text x="845" y="525" text-anchor="middle" font-size="22" fill="#F59E0B" font-weight="600" stroke="none">Sentinel</text>

  <g font-family="'Segoe UI','Noto Sans','Arial',sans-serif" fill="#111827">
    <text x="800" y="770" font-size="76" text-anchor="middle" font-weight="800">Redis 高可用阶段概述</text>
    <text x="800" y="835" font-size="28" text-anchor="middle" font-weight="600" fill="#6B7280">主从复制 · 哨兵机制 · 故障转移</text>
  </g>
</svg>

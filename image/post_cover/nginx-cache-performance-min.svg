<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="#ffffff"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Speed gauge (left-center) -->
    <path d="M200 400 A180 180 0 0 1 500 240" stroke="#E5E7EB" stroke-width="14"/>
    <path d="M200 400 A180 180 0 0 1 480 255" stroke="#009639" stroke-width="14" opacity="0.7"/>
    <path d="M200 400 A180 180 0 0 1 440 275" stroke="#34D399" stroke-width="10" opacity="0.5"/>
    <circle cx="200" cy="400" r="10" fill="#6B7280"/>
    <!-- Needle -->
    <line x1="200" y1="400" x2="340" y2="240" stroke="#EF4444" stroke-width="4" opacity="0.7"/>
    <circle cx="200" cy="400" r="16" fill="none" stroke="#009639" stroke-width="3"/>
    <!-- Speed labels -->
    <text x="200" y="440" text-anchor="middle" font-size="14" fill="#6B7280" font-weight="600">性能指标</text>

    <!-- Cache layers (right-center) - layered boxes -->
    <g transform="translate(1000, 160)">
      <!-- Browser cache -->
      <rect x="0" y="0" width="280" height="70" rx="12" stroke="#F59E0B" stroke-width="3" fill="#FFFBEB"/>
      <text x="140" y="30" text-anchor="middle" font-size="16" fill="#D97706" font-weight="700">浏览器缓存</text>
      <text x="140" y="52" text-anchor="middle" font-size="13" fill="#D97706" opacity="0.7">Cache-Control · ETag</text>

      <!-- Nginx cache -->
      <rect x="0" y="100" width="280" height="70" rx="12" stroke="#009639" stroke-width="4" fill="#F0FDF4"/>
      <text x="140" y="130" text-anchor="middle" font-size="16" fill="#009639" font-weight="700">Nginx 代理缓存</text>
      <text x="140" y="152" text-anchor="middle" font-size="13" fill="#009639" opacity="0.7">proxy_cache · fastcgi_cache</text>

      <!-- Upstream -->
      <rect x="0" y="200" width="280" height="70" rx="12" stroke="#6B7280" stroke-width="3" fill="#F9FAFB"/>
      <text x="140" y="230" text-anchor="middle" font-size="16" fill="#6B7280" font-weight="700">上游应用</text>
      <text x="140" y="252" text-anchor="middle" font-size="13" fill="#6B7280" opacity="0.7">应用层缓存 · 数据库</text>

      <!-- Cache arrows between layers -->
      <path d="M140 70 L140 100" stroke="#009639" stroke-width="3" opacity="0.5" marker-end="url(#arrowGC)"/>
      <path d="M140 170 L140 200" stroke="#009639" stroke-width="3" opacity="0.4" marker-end="url(#arrowGC)"/>

      <!-- Cache hit/miss indicator -->
      <text x="300" y="135" font-size="12" fill="#34D399" font-weight="600">HIT ✓</text>
      <text x="300" y="165" font-size="12" fill="#F59E0B" font-weight="600">MISS →</text>
    </g>

    <!-- Compression icons (middle area) -->
    <g transform="translate(550, 200)">
      <!-- File before compression -->
      <rect x="0" y="0" width="100" height="80" rx="8" stroke="#6B7280" stroke-width="3" fill="#F9FAFB"/>
      <line x1="15" y1="15" x2="85" y2="15" stroke="#6B7280" stroke-width="2" opacity="0.4"/>
      <line x1="15" y1="30" x2="75" y2="30" stroke="#6B7280" stroke-width="2" opacity="0.4"/>
      <line x1="15" y1="45" x2="80" y2="45" stroke="#6B7280" stroke-width="2" opacity="0.4"/>
      <line x1="15" y1="60" x2="65" y2="60" stroke="#6B7280" stroke-width="2" opacity="0.4"/>
      <text x="50" y="75" text-anchor="middle" font-size="10" fill="#6B7280">original</text>

      <!-- Compression arrow -->
      <path d="M110 30 L170 30" stroke="#009639" stroke-width="3" opacity="0.6" marker-end="url(#arrowGC)"/>

      <!-- File after compression -->
      <rect x="0" y="0" width="65" height="55" rx="8" stroke="#009639" stroke-width="3" fill="#F0FDF4"/>
      <rect x="12" y="10" width="18" height="18" rx="4" stroke="#009639" stroke-width="2" opacity="0.6"/>
      <line x1="35" y1="15" x2="55" y2="15" stroke="#009639" stroke-width="2"/>
      <line x1="35" y1="28" x2="50" y2="28" stroke="#009639" stroke-width="2"/>
      <text x="32" y="50" text-anchor="middle" font-size="10" fill="#009639">gzip</text>
    </g>

    <!-- Static file icons -->
    <g transform="translate(500, 450)">
      <rect x="0" y="0" width="60" height="60" rx="8" stroke="#009639" stroke-width="2.5" fill="#F0FDF4"/>
      <text x="30" y="38" text-anchor="middle" font-size="20">📄</text>
      <rect x="80" y="0" width="60" height="60" rx="8" stroke="#F59E0B" stroke-width="2.5" fill="#FFFBEB"/>
      <text x="110" y="38" text-anchor="middle" font-size="20">🖼</text>
      <rect x="160" y="0" width="60" height="60" rx="8" stroke="#34D399" stroke-width="2.5" fill="#ECFDF5"/>
      <text x="190" y="38" text-anchor="middle" font-size="20">🎬</text>
    </g>

    <!-- Kernel tuning indication -->
    <g transform="translate(100, 580)">
      <rect x="0" y="0" width="220" height="35" rx="6" stroke="#6B7280" stroke-width="2" fill="#F9FAFB"/>
      <text x="110" y="23" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="500">sendfile · tcp_nopush · aio</text>
    </g>

    <!-- Decorative flowing lines for speed -->
    <path d="M100 140 C300 100 400 160 600 120" stroke="#009639" stroke-width="3" opacity="0.15"/>
    <path d="M400 600 C600 560 800 620 1000 560" stroke="#34D399" stroke-width="3" opacity="0.15"/>

    <!-- Decorative dots -->
    <circle cx="350" cy="160" r="3" fill="#009639" opacity="0.2"/>
    <circle cx="680" cy="580" r="4" fill="#009639" opacity="0.2"/>
    <circle cx="900" cy="500" r="3" fill="#34D399" opacity="0.2"/>
  </g>

  <defs>
    <marker id="arrowGC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#009639"/>
    </marker>
  </defs>

  <g font-family="'Segoe UI','Noto Sans','Arial',sans-serif" fill="#111827">
    <text x="800" y="790" font-size="58" text-anchor="middle" font-weight="800">缓存 · 静态资源 · 性能优化</text>
    <text x="800" y="845" font-size="26" text-anchor="middle" font-weight="600" fill="#6B7280">浏览器缓存 · gzip/Brotli · proxy_cache · 内核调优</text>
  </g>
</svg>

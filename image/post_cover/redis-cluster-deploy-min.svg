<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="#ffffff"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Server 1 -->
    <rect x="120" y="340" width="380" height="240" rx="12" stroke="#374151" stroke-width="12"/>
    <rect x="145" y="365" width="330" height="190" rx="8" stroke="#D1D5DB" stroke-width="3" opacity="0.4"/>
    <text x="310" y="320" text-anchor="middle" font-size="18" fill="#6B7280" stroke="none" font-weight="600">VM 1  (192.168.1.11)</text>
    <!-- 2 nodes in VM1 -->
    <rect x="175" y="400" width="100" height="100" rx="7" stroke="#DC382D" stroke-width="10"/>
    <text x="225" y="462" text-anchor="middle" font-size="34" font-weight="900" fill="#DC382D" font-family="sans-serif">N1</text>
    <rect x="330" y="400" width="100" height="100" rx="7" stroke="#DC382D" stroke-width="10"/>
    <text x="380" y="462" text-anchor="middle" font-size="34" font-weight="900" fill="#DC382D" font-family="sans-serif">N2</text>

    <!-- Server 2 -->
    <rect x="610" y="340" width="380" height="240" rx="12" stroke="#374151" stroke-width="12"/>
    <rect x="635" y="365" width="330" height="190" rx="8" stroke="#D1D5DB" stroke-width="3" opacity="0.4"/>
    <text x="800" y="320" text-anchor="middle" font-size="18" fill="#6B7280" stroke="none" font-weight="600">VM 2  (192.168.1.12)</text>
    <!-- 2 nodes in VM2 -->
    <rect x="665" y="400" width="100" height="100" rx="7" stroke="#DC382D" stroke-width="10"/>
    <text x="715" y="462" text-anchor="middle" font-size="34" font-weight="900" fill="#DC382D" font-family="sans-serif">N3</text>
    <rect x="820" y="400" width="100" height="100" rx="7" stroke="#DC382D" stroke-width="10"/>
    <text x="870" y="462" text-anchor="middle" font-size="34" font-weight="900" fill="#DC382D" font-family="sans-serif">N4</text>

    <!-- Server 3 -->
    <rect x="1100" y="340" width="380" height="240" rx="12" stroke="#374151" stroke-width="12"/>
    <rect x="1125" y="365" width="330" height="190" rx="8" stroke="#D1D5DB" stroke-width="3" opacity="0.4"/>
    <text x="1290" y="320" text-anchor="middle" font-size="18" fill="#6B7280" stroke="none" font-weight="600">VM 3  (192.168.1.13)</text>
    <!-- 2 nodes in VM3 -->
    <rect x="1155" y="400" width="100" height="100" rx="7" stroke="#DC382D" stroke-width="10"/>
    <text x="1205" y="462" text-anchor="middle" font-size="34" font-weight="900" fill="#DC382D" font-family="sans-serif">N5</text>
    <rect x="1310" y="400" width="100" height="100" rx="7" stroke="#DC382D" stroke-width="10"/>
    <text x="1360" y="462" text-anchor="middle" font-size="34" font-weight="900" fill="#DC382D" font-family="sans-serif">N6</text>

    <!-- Cross-server connections -->
    <path d="M275 450 L330 450" stroke="#DC382D" stroke-width="2" opacity="0.35"/>
    <path d="M500 450 L665 450" stroke="#DC382D" stroke-width="2" opacity="0.3"/>
    <path d="M765 450 L820 450" stroke="#DC382D" stroke-width="2" opacity="0.35"/>
    <path d="M990 450 L1155 450" stroke="#DC382D" stroke-width="2" opacity="0.3"/>

    <!-- Decorative -->
    <path d="M120 640 Q800 760 1480 640" stroke="#F59E0B" stroke-width="4" opacity="0.25"/>
    <path d="M240 200 Q800 100 1360 200" stroke="#34D399" stroke-width="3" opacity="0.2"/>
  </g>

  <g font-family="'Segoe UI','Noto Sans','Arial',sans-serif" fill="#111827">
    <text x="800" y="770" font-size="74" text-anchor="middle" font-weight="800">Redis 集群部署</text>
    <text x="800" y="835" font-size="28" text-anchor="middle" font-weight="600" fill="#6B7280">VMware · 多机多节点 · 集群搭建</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="#ffffff"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Server chassis -->
    <rect x="550" y="240" width="500" height="340" rx="20" stroke="#374151" stroke-width="16"/>
    <rect x="580" y="270" width="440" height="280" rx="12" stroke="#9CA3AF" stroke-width="4" opacity="0.5"/>
    <!-- Server vents -->
    <line x1="600" y1="420" x2="1000" y2="420" stroke="#D1D5DB" stroke-width="3"/>
    <line x1="600" y1="450" x2="1000" y2="450" stroke="#D1D5DB" stroke-width="3"/>
    <line x1="600" y1="480" x2="1000" y2="480" stroke="#D1D5DB" stroke-width="3"/>
    <!-- Server LED -->
    <circle cx="620" cy="400" r="6" fill="#34D399" stroke="none"/>

    <!-- VM label -->
    <rect x="630" y="140" width="340" height="80" rx="10" stroke="#6B7280" stroke-width="6" stroke-dasharray="12 6"/>

    <!-- Deployment arrow -->
    <path d="M800 160 L800 240" stroke="#DC382D" stroke-width="8"/>
    <path d="M770 210 L800 240 L830 210" stroke="#DC382D" stroke-width="6" fill="none"/>

    <!-- Redis cube on server -->
    <rect x="730" y="300" width="140" height="140" rx="10" stroke="#DC382D" stroke-width="18"/>
    <text x="800" y="390" text-anchor="middle" font-size="54" font-weight="900" fill="#DC382D" font-family="sans-serif">R</text>

    <!-- Linux penguin silhouette hint -->
    <path d="M1120 480 Q1140 440 1160 460 Q1180 480 1160 500 Q1140 520 1120 500 Z" stroke="#F59E0B" stroke-width="5" opacity="0.6"/>
  </g>

  <g font-family="'Segoe UI','Noto Sans','Arial',sans-serif" fill="#111827">
    <text x="800" y="770" font-size="74" text-anchor="middle" font-weight="800">Redis 单机部署</text>
    <text x="800" y="835" font-size="28" text-anchor="middle" font-weight="600" fill="#6B7280">VMware · Linux · 环境搭建</text>
  </g>
</svg>

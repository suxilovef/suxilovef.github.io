<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="#ffffff"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Server 1 (Master) -->
    <rect x="200" y="280" width="320" height="260" rx="14" stroke="#374151" stroke-width="12"/>
    <rect x="225" y="305" width="270" height="210" rx="8" stroke="#D1D5DB" stroke-width="3" opacity="0.4"/>
    <rect x="290" y="340" width="140" height="140" rx="8" stroke="#DC382D" stroke-width="16"/>
    <text x="360" y="428" text-anchor="middle" font-size="48" font-weight="900" fill="#DC382D" font-family="sans-serif">M</text>
    <text x="360" y="540" text-anchor="middle" font-size="20" fill="#374151" stroke="none" font-weight="600">Master</text>

    <!-- Server 2 (Replica) -->
    <rect x="1080" y="280" width="320" height="260" rx="14" stroke="#374151" stroke-width="12"/>
    <rect x="1105" y="305" width="270" height="210" rx="8" stroke="#D1D5DB" stroke-width="3" opacity="0.4"/>
    <rect x="1170" y="340" width="140" height="140" rx="8" stroke="#DC382D" stroke-width="12" opacity="0.45"/>
    <text x="1240" y="428" text-anchor="middle" font-size="48" font-weight="900" fill="#DC382D" font-family="sans-serif" opacity="0.45">R</text>
    <text x="1240" y="540" text-anchor="middle" font-size="20" fill="#374151" stroke="none" font-weight="600">Replica</text>

    <!-- Replication line between servers -->
    <path d="M520 370 L1080 370" stroke="#DC382D" stroke-width="5" stroke-dasharray="12 8"/>
    <path d="M520 410 L1080 410" stroke="#34D399" stroke-width="3" stroke-dasharray="6 6" opacity="0.6"/>
    <path d="M1050 350 L1080 370 L1050 390" stroke="#DC382D" stroke-width="4" fill="none"/>

    <!-- Sentinel overlay -->
    <g transform="translate(730,160)">
      <path d="M30 0 L38 20 L60 24 L42 40 L46 62 L30 52 L14 62 L18 40 L0 24 L22 20 Z" stroke="#F59E0B" stroke-width="4" fill="none"/>
    </g>
    <text x="760" y="165" text-anchor="middle" font-size="20" fill="#F59E0B" stroke="none" font-weight="600">Sentinel</text>

    <!-- Decorative -->
    <path d="M340 560 Q800 680 1260 560" stroke="#F59E0B" stroke-width="4" opacity="0.3"/>
  </g>

  <!-- VM badges -->
  <rect x="230" y="240" width="100" height="34" rx="6" fill="#6B7280" stroke="none" opacity="0.15"/>
  <text x="280" y="262" text-anchor="middle" font-size="16" fill="#6B7280" stroke="none" font-weight="600">VMware</text>
  <rect x="1110" y="240" width="100" height="34" rx="6" fill="#6B7280" stroke="none" opacity="0.15"/>
  <text x="1160" y="262" text-anchor="middle" font-size="16" fill="#6B7280" stroke="none" font-weight="600">VMware</text>

  <g font-family="'Segoe UI','Noto Sans','Arial',sans-serif" fill="#111827">
    <text x="800" y="770" font-size="74" text-anchor="middle" font-weight="800">Redis 高可用部署</text>
    <text x="800" y="835" font-size="28" text-anchor="middle" font-weight="600" fill="#6B7280">VMware · Linux · 哨兵集群搭建</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="#ffffff"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Background decorative -->
    <path d="M200 200 Q430 70 650 170" stroke="#F59E0B" stroke-width="5" opacity="0.20"/>
    <path d="M1200 220 Q1380 150 1480 250" stroke="#34D399" stroke-width="4" opacity="0.15"/>
    <path d="M220 680 Q500 800 800 700 Q1100 600 1380 730" stroke="#6DB33F" stroke-width="4" opacity="0.10"/>
    <circle cx="280" cy="230" r="4" fill="#6DB33F" opacity="0.15"/>
    <circle cx="1320" cy="300" r="4" fill="#F59E0B" opacity="0.13"/>

    <!-- Onion layers (concentric arcs representing Around advice nesting) -->
    <!-- Outermost layer: Around 1 -->
    <path d="M320 220 Q800 100 1280 220" stroke="#6DB33F" stroke-width="8" opacity="0.55"/>
    <path d="M320 600 Q800 720 1280 600" stroke="#6DB33F" stroke-width="8" opacity="0.55"/>

    <!-- Layer 2: Around 2 -->
    <path d="M420 280 Q800 170 1180 280" stroke="#34D399" stroke-width="7" opacity="0.60"/>
    <path d="M420 540 Q800 650 1180 540" stroke="#34D399" stroke-width="7" opacity="0.60"/>

    <!-- Layer 3: TransactionInterceptor -->
    <path d="M520 340 Q800 240 1080 340" stroke="#F59E0B" stroke-width="6" opacity="0.60"/>
    <path d="M520 480 Q800 580 1080 480" stroke="#F59E0B" stroke-width="6" opacity="0.60"/>

    <!-- Center: Target method -->
    <rect x="620" y="340" width="360" height="140" rx="14" stroke="#6DB33F" stroke-width="12" fill="#F7FEE7"/>
    <text x="800" y="420" text-anchor="middle" font-size="28" font-weight="900" fill="#6DB33F" font-family="sans-serif" opacity="0.55">Target</text>
    <text x="800" y="450" text-anchor="middle" font-size="16" font-weight="700" fill="#6DB33F" font-family="sans-serif" opacity="0.45">method()</text>

    <!-- proceed() recursion arrows -->
    <!-- From Around1 to Around2 -->
    <path d="M560 310 L620 345" stroke="#F59E0B" stroke-width="5" opacity="0.7"/>
    <polygon points="625,350 613,340 622,348" fill="#F59E0B"/>

    <!-- From Around2 to Transaction -->
    <path d="M620 400 L680 400" stroke="#F59E0B" stroke-width="4" opacity="0.6"/>
    <polygon points="690,400 678,392 678,408" fill="#F59E0B"/>

    <!-- proceed() label -->
    <text x="650" y="320" font-size="14" font-weight="800" fill="#F59E0B" font-family="sans-serif">proceed()</text>

    <!-- Return arrows (after) -->
    <path d="M980 460 L920 420" stroke="#34D399" stroke-width="4" opacity="0.5"/>
    <polygon points="915,415 927,420 920,428" fill="#34D399"/>

    <!-- Layer labels -->
    <g font-family="'Segoe UI','Noto Sans','Arial',sans-serif" font-size="14" font-weight="700">
      <text x="310" y="240" fill="#6DB33F">@Around #1</text>
      <text x="400" y="300" fill="#34D399">@Around #2</text>
      <text x="500" y="365" fill="#F59E0B">Transaction</text>
    </g>

    <!-- Interceptor chain visualization (bottom) -->
    <rect x="280" y="650" width="120" height="44" rx="10" stroke="#6DB33F" stroke-width="4" fill="#F7FEE7"/>
    <text x="340" y="677" text-anchor="middle" font-size="15" font-weight="700" fill="#6DB33F" font-family="sans-serif">Interceptor 0</text>

    <path d="M400 672 L460 672" stroke="#6DB33F" stroke-width="4"/>
    <polygon points="470,672 458,664 458,680" fill="#6DB33F"/>

    <rect x="480" y="650" width="120" height="44" rx="10" stroke="#34D399" stroke-width="4" fill="#ECFDF5"/>
    <text x="540" y="677" text-anchor="middle" font-size="15" font-weight="700" fill="#34D399" font-family="sans-serif">Interceptor 1</text>

    <path d="M600 672 L660 672" stroke="#34D399" stroke-width="4"/>
    <polygon points="670,672 658,664 658,680" fill="#34D399"/>

    <rect x="680" y="650" width="120" height="44" rx="10" stroke="#F59E0B" stroke-width="4" fill="#FFFBEB"/>
    <text x="740" y="677" text-anchor="middle" font-size="15" font-weight="700" fill="#F59E0B" font-family="sans-serif">Interceptor N</text>

    <path d="M800 672 L860 672" stroke="#F59E0B" stroke-width="4"/>
    <polygon points="870,672 858,664 858,680" fill="#F59E0B"/>

    <rect x="880" y="648" width="140" height="48" rx="12" stroke="#6DB33F" stroke-width="6" fill="#F7FEE7"/>
    <text x="950" y="677" text-anchor="middle" font-size="16" font-weight="800" fill="#6DB33F" font-family="sans-serif">invokeJoinpoint</text>

    <!-- currentInterceptorIndex label -->
    <text x="800" y="730" text-anchor="middle" font-size="15" font-weight="700" fill="#6B7280" font-family="sans-serif">currentInterceptorIndex: -1 → 0 → 1 → ... → N</text>

    <!-- Decorative -->
    <circle cx="1150" cy="700" r="5" fill="#34D399" opacity="0.14"/>
  </g>

  <!-- Title section -->
  <g font-family="'Segoe UI','Noto Sans','Arial',sans-serif" fill="#111827">
    <text x="800" y="795" font-size="76" text-anchor="middle" font-weight="800">Spring AOP 拦截器链</text>
    <text x="800" y="848" font-size="28" text-anchor="middle" font-weight="600" fill="#6B7280">ReflectiveMethodInvocation · proceed() 递归 · 洋葱模型</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="#ffffff"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Config file brackets decoration -->
    <path d="M140 180 L100 180 L100 740 L140 740" stroke="#009639" stroke-width="6" opacity="0.25"/>
    <path d="M1460 180 L1500 180 L1500 740 L1460 740" stroke="#009639" stroke-width="6" opacity="0.25"/>

    <!-- Config file top bar -->
    <rect x="160" y="160" width="1280" height="40" rx="8" fill="#009639" opacity="0.08"/>
    <circle cx="185" cy="180" r="6" fill="#EF4444" opacity="0.6"/>
    <circle cx="210" cy="180" r="6" fill="#F59E0B" opacity="0.6"/>
    <circle cx="235" cy="180" r="6" fill="#34D399" opacity="0.6"/>

    <!-- Config lines inside -->
    <line x1="180" y1="230" x2="600" y2="230" stroke="#009639" stroke-width="3" opacity="0.2"/>
    <line x1="180" y1="270" x2="750" y2="270" stroke="#009639" stroke-width="3" opacity="0.3"/>
    <line x1="220" y1="310" x2="680" y2="310" stroke="#6B7280" stroke-width="3" opacity="0.2"/>
    <line x1="220" y1="350" x2="550" y2="350" stroke="#6B7280" stroke-width="3" opacity="0.15"/>
    <line x1="180" y1="390" x2="900" y2="390" stroke="#009639" stroke-width="3" opacity="0.3"/>
    <line x1="220" y1="430" x2="620" y2="430" stroke="#6B7280" stroke-width="3" opacity="0.2"/>
    <line x1="220" y1="470" x2="700" y2="470" stroke="#6B7280" stroke-width="3" opacity="0.15"/>
    <line x1="180" y1="510" x2="850" y2="510" stroke="#009639" stroke-width="3" opacity="0.25"/>
    <line x1="220" y1="550" x2="500" y2="550" stroke="#6B7280" stroke-width="3" opacity="0.15"/>

    <!-- Routing diagram overlay - request flow -->
    <path d="M800 200 L800 240" stroke="#F59E0B" stroke-width="3" opacity="0.7" marker-end="url(#arrowOrange)"/>

    <!-- server block highlight boxes -->
    <rect x="180" y="250" width="580" height="30" rx="4" fill="#009639" opacity="0.06"/>
    <rect x="180" y="370" width="900" height="30" rx="4" fill="#009639" opacity="0.06"/>

    <!-- Routing tree diagram (right side overlay) -->
    <g transform="translate(1050, 200)">
      <!-- Root node -->
      <circle cx="0" cy="0" r="20" fill="#009639" opacity="0.15" stroke="#009639" stroke-width="3"/>
      <text x="0" y="5" text-anchor="middle" font-size="14" fill="#009639" font-weight="700">listen</text>

      <!-- Branches -->
      <line x1="0" y1="20" x2="-100" y2="80" stroke="#009639" stroke-width="3" opacity="0.5"/>
      <line x1="0" y1="20" x2="100" y2="80" stroke="#009639" stroke-width="3" opacity="0.5"/>

      <!-- server nodes -->
      <rect x="-160" y="80" width="120" height="40" rx="8" stroke="#009639" stroke-width="2.5" fill="#F0FDF4" opacity="0.8"/>
      <text x="-100" y="105" text-anchor="middle" font-size="13" fill="#009639" font-weight="600">server a.com</text>

      <rect x="40" y="80" width="120" height="40" rx="8" stroke="#009639" stroke-width="2.5" fill="#F0FDF4" opacity="0.8"/>
      <text x="100" y="105" text-anchor="middle" font-size="13" fill="#009639" font-weight="600">server b.com</text>

      <!-- location sub-branches -->
      <line x1="-100" y1="120" x2="-160" y2="170" stroke="#6B7280" stroke-width="2" opacity="0.4"/>
      <line x1="-100" y1="120" x2="-60" y2="170" stroke="#6B7280" stroke-width="2" opacity="0.4"/>

      <rect x="-210" y="170" width="100" height="35" rx="6" stroke="#6B7280" stroke-width="2" fill="#F9FAFB"/>
      <text x="-160" y="193" text-anchor="middle" font-size="12" fill="#6B7280">location /</text>

      <rect x="-110" y="170" width="100" height="35" rx="6" stroke="#6B7280" stroke-width="2" fill="#F9FAFB"/>
      <text x="-60" y="193" text-anchor="middle" font-size="12" fill="#6B7280">location /api</text>

      <!-- Key annotations -->
      <text x="-100" y="245" font-size="12" fill="#F59E0B" font-weight="600">Host 匹配 →</text>
      <text x="-160" y="230" font-size="11" fill="#6B7280">URI 匹配 →</text>
    </g>

    <!-- Decorative curve showing request flow -->
    <path d="M80 800 C200 700 400 720 600 650 C800 580 1000 660 1200 580 C1400 500 1500 560 1500 560" stroke="#009639" stroke-width="4" opacity="0.2"/>
  </g>

  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <g font-family="'Segoe UI','Noto Sans','Arial',sans-serif" fill="#111827">
    <text x="800" y="790" font-size="64" text-anchor="middle" font-weight="800">配置体系与请求匹配</text>
    <text x="800" y="845" font-size="26" text-anchor="middle" font-weight="600" fill="#6B7280">server · location · rewrite · try_files · 变量体系</text>
  </g>
</svg>

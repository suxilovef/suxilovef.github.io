
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物境 | 九方</title>
  <meta name="description" content="物境：格物致知 · 理以载道">
  <link rel="icon" href="/image/favicon.jpg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7fafb;--panel:#ffffff;--text:#162838;--muted:#687b88;--line:#cfdae1;--deep:#285b75;--accent:#4f91a8;--soft:#eaf3f5;--wash:#f1f7f8}
    body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#eef6f7 0%,var(--bg) 42%,#fff 100%);color:var(--text);line-height:1.6}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(40,91,117,.06) 1px,transparent 1px),linear-gradient(180deg,rgba(40,91,117,.045) 1px,transparent 1px);background-size:38px 38px;mask-image:linear-gradient(180deg,#000,transparent 70%)}
    a{color:inherit}
    .wrap{position:relative;max-width:1120px;margin:0 auto;padding:2rem 1.4rem 3rem}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:4rem}
    .brand{font-family:"Noto Serif SC",serif;font-weight:700;text-decoration:none;letter-spacing:0;color:var(--deep)}
    .nav{display:flex;gap:.5rem;flex-wrap:wrap}
    .nav a{width:34px;height:34px;border:1px solid var(--line);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;color:var(--deep);background:rgba(255,255,255,.76);transition:all .15s}
    .nav a:hover{background:var(--deep);border-color:var(--deep);color:#fff}
    .nav a:focus-visible,
    .article-card:focus-visible,
    .sort:focus-visible,
    .filter-chip:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
    .hero{display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:2rem;align-items:end;margin-bottom:2.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--line)}
    .eyebrow{font-size:.78rem;color:var(--accent);font-weight:600;margin-bottom:.55rem}
    h1{font-family:"Noto Serif SC",serif;font-size:clamp(2.4rem,7vw,5rem);line-height:1;letter-spacing:0;color:var(--deep)}
    .tagline{font-family:"Noto Serif SC",serif;font-size:1.05rem;color:var(--muted);margin-top:.75rem}
    .summary{border-left:3px solid var(--accent);padding-left:1rem;color:var(--muted);font-size:.92rem}
    .summary strong{display:block;color:var(--text);font-size:1.5rem;line-height:1.2;margin-bottom:.2rem}
    .toolbar{display:flex;justify-content:flex-end;align-items:center;margin:0 0 1rem}
    .sort{height:38px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.82);color:var(--deep);padding:0 .65rem;font:inherit;outline:none}
    .filters{display:flex;flex-wrap:wrap;gap:.45rem;margin:0 0 1.1rem}
    .filter-chip{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.72);color:var(--muted);padding:.28rem .72rem;font:inherit;font-size:.8rem;cursor:pointer;transition:all .15s}
    .filter-chip:hover,
    .filter-chip[aria-pressed=true]{border-color:var(--accent);background:var(--deep);color:#fff}
    .list-status{color:var(--muted);font-size:.78rem;margin:0 0 .75rem}
    .article-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.85rem}
    .article-card{min-height:150px;display:flex;gap:1rem;padding:1rem;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.82);text-decoration:none;box-shadow:0 14px 34px rgba(31,59,73,.07);transition:transform .15s,border-color .15s,box-shadow .15s}
    .article-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 18px 42px rgba(31,59,73,.11)}
    .article-card:first-child{grid-column:1/-1;min-height:210px;background:linear-gradient(135deg,#fff 0%,var(--wash) 100%)}
    .cover{width:112px;border-radius:7px;background:var(--soft);background-size:cover;background-position:center;flex-shrink:0;border:1px solid rgba(40,91,117,.1)}
    .article-card:first-child .cover{width:180px}
    .placeholder{display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:1.4rem}
    .content{min-width:0;display:flex;flex-direction:column}
    h2{font-size:1.05rem;line-height:1.35;margin-bottom:.45rem;color:var(--text)}
    .article-card:first-child h2{font-size:1.45rem}
    .desc{color:var(--muted);font-size:.86rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:auto}
    .meta{display:flex;gap:.45rem;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:.76rem;margin-top:.9rem}
    .tag{padding:.12rem .42rem;border-radius:999px;background:var(--soft);color:var(--deep)}
    .empty{padding:1rem;border:1px dashed var(--line);border-radius:8px;color:var(--muted)}
    .load-sentinel{height:32px;margin-top:1rem}
    @media screen and (max-width:760px){
      .wrap{padding:1.2rem 1rem 2.4rem}
      .topbar{margin-bottom:2.8rem}
      .hero{grid-template-columns:1fr;gap:1.2rem}
      .summary{border-left:0;border-top:3px solid var(--accent);padding:.85rem 0 0}
      .toolbar{justify-content:stretch}
      .sort{width:100%}
      .article-grid{grid-template-columns:1fr}
      .article-card,.article-card:first-child{grid-column:auto;min-height:auto;flex-direction:column}
      .cover,.article-card:first-child .cover{width:100%;height:150px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <a class="brand" href="/">九方</a>
      <nav class="nav" aria-label="页面导航">
        <a href="/" title="首页" aria-label="首页"><i class="fas fa-home"></i></a>
        <a href="/xinjing/" title="心境" aria-label="心境"><i class="fas fa-feather-alt"></i></a>
      </nav>
    </header>

    <section class="hero">
      <div>
        <div class="eyebrow">Realm of Method</div>
        <h1>物境</h1>
        <p class="tagline">格物致知 · 理以载道</p>
      </div>
      <div class="summary">
        <strong id="postCount">0</strong>
        <span>篇文章按设定顺序展开</span>
      </div>
    </section>

    <section class="toolbar" aria-label="文章筛选">
      <select class="sort" id="articleSort" aria-label="排序方式">
        <option value="rank">设定顺序</option>
        <option value="date">最新优先</option>
        <option value="title">标题顺序</option>
      </select>
    </section>
    <section class="filters" id="articleFilters" aria-label="标签筛选"></section>
    <p class="list-status">显示 <span id="shownCount">0</span> / <span id="postCountInline">0</span></p>
    <section class="article-grid" id="articleGrid"></section>
    <div class="load-sentinel" id="autoLoadSentinel" aria-hidden="true"></div>
  </main>

  <script src="/js/realm-posts.js"></script>
  <script>
  (function(){
    RealmPosts.fetch().then(function(posts){
      RealmPosts.renderManagedRealmPage(posts, {
        realm: 'wujing',
        fallbackCategory: 'Java',
        fallbackPath: '/java/',
        countId: 'postCount',
        countIds: ['postCountInline'],
        shownId: 'shownCount',
        filterId: 'articleFilters',
        sortId: 'articleSort',
        sentinelId: 'autoLoadSentinel',
        pageSize: 12,
        filterSource: 'tags',
        listId: 'articleGrid',
        placeholderIcon: 'fas fa-cube'
      });
    }).catch(function(err){ console.error(err); });
  })();
  </script>
</body>
</html>

/* ============== 文章页：TOC + 暗色模式 ============== */
(function(){
  var isPost = document.querySelector('#body-wrap.post');
  if (!isPost) return;

  function setPostRealm(realm) {
    document.documentElement.classList.remove('post-realm-wujing', 'post-realm-xinjing');
    if (realm === 'wujing' || realm === 'xinjing') {
      document.documentElement.classList.add('post-realm-' + realm);
    }
  }

  var currentPath = decodeURIComponent(location.pathname).replace(/^\/+/, '').replace(/\/?$/, '/');
  if (currentPath.indexOf('/物境/') !== -1 || currentPath.indexOf('物境/') === 0 || currentPath.indexOf('/java/') !== -1 || currentPath.indexOf('java/') === 0) {
    setPostRealm('wujing');
  } else if (currentPath.indexOf('/心境/') !== -1 || currentPath.indexOf('心境/') === 0 || currentPath.indexOf('/scriptures/') !== -1 || currentPath.indexOf('scriptures/') !== -1) {
    setPostRealm('xinjing');
  }

  fetch('/posts.json').then(function(r) {
    return r.json();
  }).then(function(data) {
    var posts = Array.isArray(data) ? data : (data && Array.isArray(data.posts) ? data.posts : []);
    var current = posts.find(function(post) {
      return post.path && post.path.replace(/^\/+/, '').replace(/\/?$/, '/') === currentPath;
    });
    if (current && current.realm) setPostRealm(current.realm);
  }).catch(function() {});

  /* ---- TOC ---- */
  var article = document.getElementById('article-container');
  var headings = article ? article.querySelectorAll('h2,h3') : [];
  if (headings.length) {
    var toc = document.createElement('nav');
    toc.className = 'custom-toc';
    headings.forEach(function(h, i) {
      var id = h.id || ('h-' + i);
      if (!h.id) h.id = id;
      var a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      a.className = h.tagName === 'H3' ? 'toc-h3' : 'toc-h2';
      a.addEventListener('click', function(e) {
        e.preventDefault();
        var t = document.getElementById(id);
        if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      toc.appendChild(a);
    });
    var ci = document.querySelector('#content-inner');
    if (ci) ci.insertBefore(toc, article);

    /* scroll spy */
    var links = toc.querySelectorAll('a');
    window.addEventListener('scroll', function() {
      var top = window.scrollY + 130;
      var cur = '';
      headings.forEach(function(h) { if (h.offsetTop <= top) cur = h.id; });
      links.forEach(function(a) { a.classList.toggle('active', a.getAttribute('href') === '#' + cur); });
    });
  }

  /* ---- 暗色模式 ---- */
  if (localStorage.getItem('darkMode') === 'true') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
